<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vague Blue - Studio Edition</title>
    <style>
        html, body { 
            margin: 0; 
            background-color: #ffffff; 
            height: 100vh; 
            overflow: hidden; 
            cursor: none; 
        }

        canvas { display: block; position: fixed; top: 0; left: 0; }

        #custom-cursor {
            position: fixed;
            top: 0; left: 0;
            width: 25px; height: 25px;
            pointer-events: none;
            z-index: 10000;
            background-image: url('pointer.svg');
            background-size: contain;
            background-repeat: no-repeat;
            display: none;
            transform: translate(-50%, -50%);
            will-change: transform;
        }

        /* Masquer le menu pour le rendu final, ou le laisser pour tes tests */
        .controls {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 15px; border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            font-family: sans-serif; z-index: 10001;
            display: flex; flex-direction: column; gap: 8px;
        }
    </style>
</head>
<body>

<div id="custom-cursor"></div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
    }
</script>

<script type="module">
    import * as THREE from 'three';

    // ==========================================
    // CONFIGURATION DE LA FORME (Variables modifiables)
    // ==========================================
    const config = {
        // Placement de la forme (X, Y, Z)
        path: {
            start:   new THREE.Vector3(18, 18, -5),   // Haut Droite
            control: new THREE.Vector3(15, -15, 0),  // Point de virage
            end:     new THREE.Vector3(-25, -10, 5)   // Bas Gauche
        },
        // Apparence
        points: {
            count: 20000,
            size: 200.0,           // Taille globale des points
            spread: 12.0,          // Largeur / Espacement de la traînée
            baseColor: '#001DFC', // Bleu d'origine
            hoverColor: '#00FCDA' // Cyan hover
        },
        // Mouvement
        animation: {
            oscillationSpeed: 2.5,
            oscillationStrength: 0.15,
            hoverAttraction: 0.6,
            hoverRadius: 5.0
        }
    };

    let scene, camera, renderer, pointsMesh, interactionPlane;
    let mouseNDC = new THREE.Vector2(-2, -2);
    let smoothIntersects = new THREE.Vector3(0, 0, 0);
    const raycaster = new THREE.Raycaster();
    const clock = new THREE.Clock();
    const cursorEl = document.getElementById('custom-cursor');

    init();

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0xffffff);

        const aspect = window.innerWidth / window.innerHeight;
        camera = new THREE.PerspectiveCamera(45, aspect, 0.1, 1000);
        camera.position.set(0, 0, 30);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        interactionPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshBasicMaterial({ visible: false })
        );
        scene.add(interactionPlane);

        createWave();

        window.addEventListener('mousemove', (e) => {
            cursorEl.style.display = 'block';
            cursorEl.style.left = e.clientX + 'px';
            cursorEl.style.top = e.clientY + 'px';
            mouseNDC.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouseNDC.y = -(e.clientY / window.innerHeight) * 2 + 1;
        });

        window.addEventListener('resize', onWindowResize);
        animate();
    }

    function createWave() {
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(config.points.count * 3);
        const randoms = new Float32Array(config.points.count);
        const progress = new Float32Array(config.points.count);

        const curve = new THREE.QuadraticBezierCurve3(
            config.path.start, 
            config.path.control, 
            config.path.end
        );

        for (let i = 0; i < config.points.count; i++) {
            const t = Math.random();
            const p = curve.getPoint(t);
            
            const radius = 0.1 + (t * config.points.spread); 
            const theta = Math.random() * Math.PI * 2;
            const r = Math.pow(Math.random(), 1.5) * radius;

            positions[i * 3] = p.x + Math.cos(theta) * r;
            positions[i * 3 + 1] = p.y + Math.sin(theta) * r;
            positions[i * 3 + 2] = p.z + (Math.random() - 0.5) * r;
            
            randoms[i] = Math.random();
            progress[i] = t;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aRandom', new THREE.BufferAttribute(randoms, 1));
        geometry.setAttribute('aProgress', new THREE.BufferAttribute(progress, 1));

        const mat = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0 },
                uMouse3D: { value: new THREE.Vector3(0,0,0) },
                uPointSize: { value: config.points.size },
                uBaseColor: { value: new THREE.Color(config.points.baseColor) },
                uHoverColor: { value: new THREE.Color(config.points.hoverColor) },
                uHoverRadius: { value: config.animation.hoverRadius },
                uOscSpeed: { value: config.animation.oscillationSpeed },
                uOscStrength: { value: config.animation.oscillationStrength },
                uAttraction: { value: config.animation.hoverAttraction }
            },
            vertexShader: `
                varying float vAlpha;
                varying vec3 vColor;
                uniform float uTime, uPointSize, uHoverRadius, uOscSpeed, uOscStrength, uAttraction;
                uniform vec3 uMouse3D, uBaseColor, uHoverColor;
                attribute float aRandom, aProgress;

                void main() {
                    vec3 p = position;
                    
                    // Interaction
                    float distMouse = distance(p.xyz, uMouse3D);
                    float vHover = smoothstep(uHoverRadius, 0.0, distMouse);
                    vec3 dir = normalize(uMouse3D - p.xyz + 0.0001);
                    p.xyz += dir * vHover * uAttraction;
                    p.z += vHover * 1.5;

                    // Oscillation (Variables propres)
                    p.x += sin(aProgress * 10.0 + uTime * uOscSpeed) * uOscStrength;
                    p.y += cos(aProgress * 8.0 + uTime * uOscSpeed) * uOscStrength;

                    vec4 mvPos = modelViewMatrix * vec4(p, 1.0);
                    gl_PointSize = (uPointSize * (0.6 + aRandom * 0.6)) * (1.0 / -mvPos.z);
                    gl_Position = projectionMatrix * mvPos;

                    vColor = mix(uBaseColor, uHoverColor, vHover * (0.8 + aRandom * 0.2));
                    vAlpha = (0.3 + aRandom * 0.7) * smoothstep(0.0, 0.05, aProgress) * (1.0 - aProgress * 0.3);
                }
            `,
            fragmentShader: `
                varying float vAlpha;
                varying vec3 vColor;
                void main() {
                    float d = distance(gl_PointCoord, vec2(0.5));
                    if (d > 0.5) discard;
                    gl_FragColor = vec4(vColor, vAlpha * pow(1.0 - d * 2.0, 2.0));
                }
            `,
            transparent: true,
            blending: THREE.NormalBlending,
            depthWrite: false
        });

        pointsMesh = new THREE.Points(geometry, mat);
        scene.add(pointsMesh);
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        if (pointsMesh) {
            pointsMesh.material.uniforms.uTime.value = t;
            raycaster.setFromCamera(mouseNDC, camera);
            const intersects = raycaster.intersectObject(interactionPlane);
            if (intersects.length > 0) {
                smoothIntersects.lerp(intersects[0].point, 0.1);
                pointsMesh.material.uniforms.uMouse3D.value.copy(smoothIntersects);
            }
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
